# Production — docker compose -f docker-compose.prod.yml --env-file .env.prod up -d --build

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-finance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-finance_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-finance} -d ${POSTGRES_DB:-finance_db}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    networks:
      - wtma

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-finance}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-finance_db}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      ADMIN_FULL_NAME: ${ADMIN_FULL_NAME:-Administrator}
      MONTHLY_PLAN: ${MONTHLY_PLAN:-50000000}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    command: >
      sh -c "alembic upgrade head &&
             python -m app.seed &&
             exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 2"
    restart: unless-stopped
    networks:
      - wtma

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    expose:
      - "80"
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - wtma

  # HTTPS reverse proxy — Let's Encrypt + 80/443 portlar.
  caddy:
    image: caddy:2-alpine
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    environment:
      DOMAIN: ${DOMAIN:-wtma.okaposai.uz}
      LANDING_DOMAIN: ${LANDING_DOMAIN:-landing.okaposai.uz}
      ACME_EMAIL: ${ACME_EMAIL:-internal@example.com}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped
    networks:
      - wtma

volumes:
  postgres_data:
  uploads_data:
  caddy_data:
  caddy_config:

networks:
  wtma:
    name: wtma
