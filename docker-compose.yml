services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance
      POSTGRES_DB: finance_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    ports:
      - "8002:8000"
    environment:
      DATABASE_URL: postgresql://finance:finance@db:5432/finance_db
      JWT_SECRET: dev-secret-change-in-production
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      ADMIN_FULL_NAME: Administrator
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: sh -c "alembic upgrade head && python -m app.seed && exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  web:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_URL: http://api:8000
    depends_on:
      - api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: sh -c "npm install && exec npm run dev -- --host 0.0.0.0"

volumes:
  postgres_data:
