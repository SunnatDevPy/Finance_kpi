<!doctype html>
<html lang="uz" class="theme">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>WTMA — Finance Panel</title>
    <script>
      (function () {
        var theme = localStorage.getItem("finance_theme");
        var locale = localStorage.getItem("finance_locale");
        if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
        if (locale === "ru" || locale === "uz") {
          document.documentElement.lang = locale;
        }
      })();
    </script>
    <!-- Sahifa qayta yuklanganda (reload) React/Tailwind CSS va shriftlar
         ulanguncha brauzerning standart OQ foni yoki "yalang'och" element
         bir lahza chaqnab qolmasligi uchun — Apple uslubidagi kabi,
         bo'sh/yarim tayyor holat o'rniga brendlangan minimal loader
         ko'rsatiladi, ilova to'liq tayyor bo'lgach silliq (crossfade)
         almashtiriladi. Ranglar index.css dagi --background bilan mos. -->
    <style>
      html, body {
        background-color: #fafbfc;
        color-scheme: light;
      }
      html.dark, html.dark body {
        background-color: #101216;
        color-scheme: dark;
      }
      #root {
        min-height: 100vh;
        opacity: 0;
      }
      #root.app-ready {
        opacity: 1;
        transition: opacity 380ms ease-out;
      }
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #fafbfc;
        transition: opacity 420ms ease-out;
      }
      html.dark #app-loader {
        background-color: #101216;
      }
      #app-loader.app-loader--hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader__mark {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 44px;
        border-radius: 14px;
        background: #ffffff;
        padding: 6px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.14);
        animation: app-loader-breathe 1.7s ease-in-out infinite;
      }
      #app-loader__mark img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      @keyframes app-loader-breathe {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.92); opacity: 0.72; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader__mark { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-loader" aria-hidden="true">
      <div id="app-loader__mark">
        <img src="/logo.svg" alt="" />
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
