<!doctype html>
<html lang="uz" class="theme">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#fafbfc" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#101216" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="WTMA Finance" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>WTMA — Finance Panel</title>
    <script>
      (function () {
        var theme = localStorage.getItem("finance_theme");
        var locale = localStorage.getItem("finance_locale");
        if (theme === "dark" || (!theme && window.matchMedia("(prefers-color-scheme: dark)").matches)) {
          document.documentElement.classList.add("dark");
        }
        if (locale === "ru" || locale === "uz") {
          document.documentElement.lang = locale;
        }
      })();
    </script>
    <!-- Sahifa qayta yuklanganda (reload) React/Tailwind CSS va shriftlar
         ulanguncha brauzerning standart OQ foni yoki "yalang'och" element
         bir lahza chaqnab qolmasligi uchun — Apple uslubidagi kabi,
         bo'sh/yarim tayyor holat o'rniga brendlangan minimal loader
         ko'rsatiladi, ilova to'liq tayyor bo'lgach silliq (crossfade)
         almashtiriladi. Ranglar index.css dagi --background bilan mos. -->
    <style>
      html, body {
        background-color: #fafbfc;
        color-scheme: light;
      }
      html.dark, html.dark body {
        background-color: #101216;
        color-scheme: dark;
      }
      #root {
        min-height: 100vh;
        opacity: 0;
      }
      #root.app-ready {
        opacity: 1;
        transition: opacity 380ms ease-out;
      }
      #app-loader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: #fafbfc;
        transition: opacity 420ms ease-out;
      }
      html.dark #app-loader {
        background-color: #101216;
      }
      #app-loader.app-loader--hidden {
        opacity: 0;
        pointer-events: none;
      }
      #app-loader__mark {
        display: flex;
        align-items: center;
        justify-content: center;
        width: 56px;
        height: 44px;
        border-radius: 14px;
        background: #ffffff;
        padding: 6px;
        box-shadow: 0 12px 32px rgba(15, 23, 42, 0.14);
        animation: app-loader-breathe 1.7s ease-in-out infinite;
      }
      #app-loader__mark img {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      @keyframes app-loader-breathe {
        0%, 100% { transform: scale(1); opacity: 1; }
        50% { transform: scale(0.92); opacity: 0.72; }
      }
      @media (prefers-reduced-motion: reduce) {
        #app-loader__mark { animation: none; }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="app-loader" aria-hidden="true">
      <div id="app-loader__mark">
        <img src="/logo.png" alt="" />
      </div>
    </div>
    <script>
      (function () {
        var RELOAD_KEY = "wtma_recovery_reload_count";
        var MAX_RELOADS = 3;

        function localeText() {
          return localStorage.getItem("finance_locale") === "ru"
            ? {
                title: "Страница не загрузилась",
                hint: "Попробуйте обновить страницу",
                reload: "Обновить",
              }
            : {
                title: "Sahifa yuklanmadi",
                hint: "Sahifani yangilab ko'ring",
                reload: "Yangilash",
              };
        }

        window.setTimeout(function () {
          var root = document.getElementById("root");
          if (root && root.childElementCount > 0) return;
          if (document.getElementById("app-static-recovery")) return;

          var count = Number(sessionStorage.getItem(RELOAD_KEY) || 0);
          if (count < MAX_RELOADS) {
            sessionStorage.setItem(RELOAD_KEY, String(count + 1));
            window.location.reload();
            return;
          }

          var text = localeText();
          var panel = document.createElement("div");
          panel.id = "app-static-recovery";
          panel.style.cssText =
            "position:fixed;inset:0;z-index:10000;display:flex;align-items:center;justify-content:center;padding:24px;background:#fafbfc;font-family:IBM Plex Sans,system-ui,sans-serif;";
          if (document.documentElement.classList.contains("dark")) {
            panel.style.background = "#101216";
            panel.style.color = "#f8fafc";
          }
          panel.innerHTML =
            '<div style="max-width:360px;text-align:center;border:1px solid rgba(148,163,184,.35);border-radius:16px;padding:24px;background:#fff;box-shadow:0 8px 24px rgba(15,23,42,.08);">' +
            '<h1 style="margin:0 0 8px;font-size:18px;font-weight:600;">' +
            text.title +
            "</h1>" +
            '<p style="margin:0 0 16px;font-size:14px;opacity:.75;">' +
            text.hint +
            "</p>" +
            '<button type="button" id="app-static-recovery-btn" style="width:100%;border:0;border-radius:10px;padding:10px 14px;font-size:14px;font-weight:600;cursor:pointer;background:#0f172a;color:#fff;">' +
            text.reload +
            "</button></div>";
          document.body.appendChild(panel);
          document.getElementById("app-static-recovery-btn").addEventListener("click", function () {
            window.location.reload();
          });
        }, 12000);
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
